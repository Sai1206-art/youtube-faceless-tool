<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faceless Tech Video Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 0.95rem; }
        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            color: #a0a0c0;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .req { color: #6366f1; }
        textarea, input[type="text"], input[type="url"] {
            width: 100%;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 12px;
            color: #e0e0e0;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        textarea:focus, input:focus {
            outline: none;
            border-color: #6366f1;
        }
        textarea { min-height: 100px; resize: vertical; }
        .row { display: flex; gap: 16px; margin-bottom: 0; }
        .row > div { flex: 1; }
        .upload-area {
            border: 2px dashed #2a2a4a;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover { border-color: #6366f1; background: #15152a; }
        .upload-area.has-files { border-color: #22c55e; border-style: solid; }
        .upload-icon { font-size: 2rem; margin-bottom: 8px; }
        .upload-text { color: #888; font-size: 0.9rem; }
        #file-input { display: none; }
        .file-list { margin-top: 12px; font-size: 0.85rem; color: #a0a0c0; }
        .file-list div { padding: 4px 0; }
        .file-list .remove { color: #ef4444; cursor: pointer; margin-left: 8px; }
        .toggle-row { display: flex; gap: 20px; margin-top: 16px; }
        .toggle {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.85rem; color: #a0a0c0; cursor: pointer;
        }
        .toggle input { width: 18px; height: 18px; accent-color: #6366f1; }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white; border: none; border-radius: 8px;
            padding: 14px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #progress-section { display: none; }
        .progress-step {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0; border-bottom: 1px solid #2a2a4a;
        }
        .progress-step:last-child { border-bottom: none; }
        .step-icon {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: bold;
            background: #2a2a4a; color: #666;
        }
        .step-icon.active { background: #6366f1; color: white; }
        .step-icon.done { background: #22c55e; color: white; }
        .step-icon.error { background: #ef4444; color: white; }
        .step-name { font-size: 0.9rem; }
        .step-status { font-size: 0.8rem; color: #666; }
        .result-card { display: none; }
        .result-link {
            display: inline-block; margin-top: 8px;
            color: #6366f1; text-decoration: none; font-size: 0.9rem;
        }
        .result-link:hover { text-decoration: underline; }
        .script-preview {
            background: #0f0f1a; border-radius: 8px; padding: 16px;
            font-family: 'Courier New', monospace; font-size: 0.85rem;
            color: #a0ffa0; max-height: 300px; overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Faceless Tech Video Generator</h1>
        <p class="subtitle">Upload product photos + prompt → get a YouTube-ready faceless video</p>

        <!-- Input Form -->
        <div class="card">
            <div style="margin-bottom: 20px;">
                <label>Prompt <span class="req">*</span></label>
                <textarea id="prompt" placeholder="e.g. Make a review video of this wireless earbuds. Focus on sound quality, battery life, and design. Target audience: tech enthusiasts looking for budget options."></textarea>
            </div>

            <div style="margin-bottom: 20px;">
                <label>Product Photos <span class="req">*</span> (upload at least 1)</label>
                <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">Click to upload product photos (PNG, JPG)</div>
                </div>
                <input type="file" id="file-input" multiple accept="image/*">
                <div class="file-list" id="file-list"></div>
            </div>

            <div class="row" style="margin-bottom: 20px;">
                <div>
                    <label>Reference Video (optional)</label>
                    <input type="file" id="ref-video" accept="video/*">
                </div>
                <div>
                    <label>Affiliate Link (optional)</label>
                    <input type="url" id="affiliate-link" placeholder="https://amazon.in/...">
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label>Extra Context (optional)</label>
                <textarea id="extra-context" placeholder="Any additional info: target audience, tone preference, specific features to highlight, etc." style="min-height: 60px;"></textarea>
            </div>

            <div class="toggle-row">
                <label class="toggle">
                    <input type="checkbox" id="upload-drive" checked>
                    Upload to Drive
                </label>
                <label class="toggle">
                    <input type="checkbox" id="upload-youtube" checked>
                    Upload to YouTube (Private)
                </label>
            </div>

            <div style="margin-top: 24px;">
                <button class="btn" id="generate-btn" onclick="generateVideo()">Generate Video</button>
            </div>
        </div>

        <!-- Progress -->
        <div class="card" id="progress-section">
            <h3 style="margin-bottom: 16px;">Pipeline Progress</h3>
            <div id="progress-steps"></div>
        </div>

        <!-- Result -->
        <div class="card result-card" id="result-card">
            <h3 style="margin-bottom: 16px;">✅ Video Generated!</h3>
            <div id="result-content"></div>
        </div>
    </div>

    <script>
        let selectedFiles = [];

        // ─── File Upload Handling ───────────────────────────
        document.getElementById('file-input').addEventListener('change', function(e) {
            for (let file of e.target.files) {
                if (file.type.startsWith('image/')) {
                    selectedFiles.push(file);
                }
            }
            updateFileList();
        });

        function updateFileList() {
            const list = document.getElementById('file-list');
            const area = document.getElementById('upload-area');
            if (selectedFiles.length === 0) {
                list.innerHTML = '';
                area.classList.remove('has-files');
                return;
            }
            area.classList.add('has-files');
            list.innerHTML = selectedFiles.map((f, i) =>
                `<div>📷 ${f.name} <span class="remove" onclick="removeFile(${i})">✕</span></div>`
            ).join('');
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        }

        // ─── Drag & Drop ────────────────────────────────────
        const uploadArea = document.getElementById('upload-area');
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#6366f1'; });
        uploadArea.addEventListener('dragleave', e => { uploadArea.style.borderColor = ''; });
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.style.borderColor = '';
            for (let file of e.dataTransfer.files) {
                if (file.type.startsWith('image/')) selectedFiles.push(file);
            }
            updateFileList();
        });

        // ─── Generate Video ─────────────────────────────────
        async function generateVideo() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) { alert('Please enter a prompt'); return; }
            if (selectedFiles.length === 0) { alert('Please upload at least 1 product photo'); return; }

            const btn = document.getElementById('generate-btn');
            btn.disabled = true;
            btn.textContent = 'Generating...';

            // Build form data
            const formData = new FormData();
            formData.append('prompt', prompt);
            formData.append('affiliate_link', document.getElementById('affiliate-link').value);
            formData.append('extra_context', document.getElementById('extra-context').value);
            formData.append('upload_drive', document.getElementById('upload-drive').checked);
            formData.append('upload_youtube', document.getElementById('upload-youtube').checked);
            for (let file of selectedFiles) {
                formData.append('product_images', file);
            }
            const refVideo = document.getElementById('ref-video').files[0];
            if (refVideo) formData.append('reference_video', refVideo);

            // Show progress section
            document.getElementById('progress-section').style.display = 'block';
            document.getElementById('result-card').style.display = 'none';

            const steps = [
                { name: 'Script Generation (GPT-4o)', key: 'script_generation' },
                { name: 'Voiceover (ElevenLabs)', key: 'tts' },
                { name: 'Stock Footage (Pexels)', key: 'stock_footage' },
                { name: 'Video Composition (MoviePy)', key: 'video_composition' },
                { name: 'Google Drive Upload', key: 'drive_upload' },
                { name: 'YouTube Upload (Private)', key: 'youtube_upload' },
            ];

            document.getElementById('progress-steps').innerHTML = steps.map(s =>
                `<div class="progress-step" id="step-${s.key}">
                    <div class="step-icon" id="icon-${s.key}">○</div>
                    <div>
                        <div class="step-name">${s.name}</div>
                        <div class="step-status" id="status-${s.key}">Pending</div>
                    </div>
                </div>`
            ).join('');

            try {
                const response = await fetch('/api/generate', { method: 'POST', body: formData });
                const data = await response.json();

                // Update step statuses
                for (let s of steps) {
                    const icon = document.getElementById(`icon-${s.key}`);
                    const status = document.getElementById(`status-${s.key}`);
                    if (data.steps_completed && data.steps_completed.includes(s.key)) {
                        icon.className = 'step-icon done';
                        icon.textContent = '✓';
                        status.textContent = 'Complete';
                    }
                }

                if (data.status === 'completed') {
                    showResult(data);
                } else {
                    // Show error
                    const errorStep = steps.find(s => !data.steps_completed.includes(s.key));
                    if (errorStep) {
                        const icon = document.getElementById(`icon-${errorStep.key}`);
                        icon.className = 'step-error';
                        icon.textContent = '✗';
                    }
                    alert('Pipeline failed: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Request failed: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate Video';
            }
        }

        function showResult(data) {
            const card = document.getElementById('result-card');
            const content = document.getElementById('result-content');
            card.style.display = 'block';

            let html = '';
            if (data.script) {
                html += `<div style="margin-bottom: 16px;">
                    <strong>Title:</strong> ${data.script.title}
                </div>`;
            }
            if (data.voiceover) {
                html += `<div style="margin-bottom: 16px;">
                    <strong>Duration:</strong> ${data.voiceover.duration}s
                </div>`;
            }
            if (data.drive) {
                html += `<div style="margin-bottom: 16px;">
                    <strong>Drive:</strong><br>
                    <a href="${data.drive.web_view_link}" target="_blank" class="result-link">📁 View on Google Drive</a>
                </div>`;
            }
            if (data.youtube) {
                html += `<div style="margin-bottom: 16px;">
                    <strong>YouTube (Private):</strong><br>
                    <a href="${data.youtube.video_url}" target="_blank" class="result-link">▶ View on YouTube (private)</a>
                </div>`;
            }
            if (data.script && data.script.description) {
                html += `<details style="margin-top: 16px;">
                    <summary style="cursor: pointer; color: #6366f1; font-size: 0.9rem;">View Script & Description</summary>
                    <div class="script-preview" style="margin-top: 12px;">Title: ${data.script.title}\n\nDescription:\n${data.script.description}\n\nScenes:\n${(data.script.scenes || []).map((s, i) => `  ${i+1}. [${s.duration_seconds}s] ${s.voiceover}\n     Visual: ${s.visual_description}\n     Overlay: ${s.text_overlay}`).join('\n')}</div>
                </details>`;
            }
            content.innerHTML = html;
        }
    </script>
</body>
</html>
