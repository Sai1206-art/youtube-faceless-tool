services:
  - type: web
    name: youtube-faceless-tool
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: ENABLE_DRIVE_UPLOAD
        value: false
      - key: ENABLE_YOUTUBE_UPLOAD
        value: false
    healthCheckPath: /api/health
